<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统管理后台</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-container">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">⚙️</span>
        <span class="logo-text">管理后台</span>
      </div>
      <nav class="nav-menu">
        <div class="nav-item active" data-section="dashboard">
          <span class="nav-icon">📊</span>
          <span>概览</span>
        </div>
        <div class="nav-item" data-section="services">
          <span class="nav-icon">🔗</span>
          <span>外部服务</span>
        </div>
        <div class="nav-item" data-section="rooms">
          <span class="nav-icon">💬</span>
          <span>房间管理</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <a href="/" class="back-link">
          <span>←</span> 返回聊天室
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 id="pageTitle">系统概览</h1>
        <div class="topbar-actions">
          <span id="systemStatus" class="status-badge">检查中...</span>
          <button id="refreshBtn" class="refresh-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
            刷新
          </button>
        </div>
      </header>

      <section id="dashboard" class="content-section active">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
              🏠
            </div>
            <div class="stat-info">
              <div class="stat-label">房间总数</div>
              <div class="stat-value" id="roomCount">--</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #34d399);">
              👥
            </div>
            <div class="stat-info">
              <div class="stat-label">在线用户</div>
              <div class="stat-value" id="userCount">--</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);">
              💬
            </div>
            <div class="stat-info">
              <div class="stat-label">消息总数</div>
              <div class="stat-value" id="msgCount">--</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #ec4899, #f472b6);">
              🤖
            </div>
            <div class="stat-info">
              <div class="stat-label">AI机器人</div>
              <div class="stat-value" id="botStatus">--</div>
            </div>
          </div>
        </div>

        <div class="section-card">
          <div class="card-header">
            <h2>服务状态</h2>
          </div>
          <div class="service-status-list" id="serviceStatusList">
          </div>
        </div>
      </section>

      <section id="services" class="content-section">
        <div class="section-card">
          <div class="card-header">
            <h2>外部系统链接</h2>
            <span class="card-subtitle">点击卡片快速访问对应服务控制台</span>
          </div>
          <div class="services-grid">
            <a href="https://platform.deepseek.com/" target="_blank" class="service-card">
              <div class="service-icon" style="background: #4f46e5;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                  <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                  <path d="M2 17l10 5 10-5"></path>
                  <path d="M2 12l10 5 10-5"></path>
                </svg>
              </div>
              <div class="service-info">
                <div class="service-name">DeepSeek</div>
                <div class="service-desc">AI 大语言模型服务</div>
              </div>
              <span class="service-arrow">→</span>
            </a>

            <a href="https://tavily.com/" target="_blank" class="service-card">
              <div class="service-icon" style="background: #0ea5e9;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </div>
              <div class="service-info">
                <div class="service-name">Tavily</div>
                <div class="service-desc">联网搜索 API</div>
              </div>
              <span class="service-arrow">→</span>
            </a>

            <a href="https://console.firebase.google.com/" target="_blank" class="service-card">
              <div class="service-icon" style="background: #f59e0b;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                  <path d="M2 22h20"></path>
                  <path d="M3.5 22V15"></path>
                  <path d="M6.5 22V5"></path>
                  <path d="M9.5 22V10"></path>
                  <path d="M12.5 22V2"></path>
                  <path d="M15.5 22V7"></path>
                  <path d="M18.5 22V12"></path>
                  <path d="M21.5 22V17"></path>
                </svg>
              </div>
              <div class="service-info">
                <div class="service-name">Firebase</div>
                <div class="service-desc">实时数据库存储</div>
              </div>
              <span class="service-arrow">→</span>
            </a>

            <a href="https://github.com/liuminghu/chat-room" target="_blank" class="service-card">
              <div class="service-icon" style="background: #1f2937;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                  <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
              </div>
              <div class="service-info">
                <div class="service-name">GitHub</div>
                <div class="service-desc">代码仓库</div>
              </div>
              <span class="service-arrow">→</span>
            </a>

            <a href="https://dashboard.render.com/" target="_blank" class="service-card">
              <div class="service-icon" style="background: #047857;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
              </div>
              <div class="service-info">
                <div class="service-name">Render</div>
                <div class="service-desc">云服务部署</div>
              </div>
              <span class="service-arrow">→</span>
            </a>
          </div>
        </div>
      </section>

      <section id="rooms" class="content-section">
        <div class="section-card">
          <div class="card-header">
            <h2>房间列表</h2>
            <span class="card-subtitle">当前运行中的所有房间</span>
          </div>
          <div id="roomList" class="room-list">
            <div class="empty-state">
              <div class="empty-icon">💬</div>
              <p>暂无房间数据</p>
              <p class="empty-sub">刷新页面重新加载</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
