<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时聊天室</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>💬 实时聊天室</h1>
      <div id="userStatus" class="user-status">未连接</div>
    </header>

    <div id="loginScreen" class="login-screen">
      <h2>加入聊天</h2>
      <input type="text" id="usernameInput" placeholder="输入你的昵称" maxlength="20">
      <button id="joinBtn">加入聊天室</button>
    </div>

    <div id="chatScreen" class="chat-screen hidden">
      <div id="messagesContainer" class="messages-container"></div>
      
      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="messageInput" placeholder="输入消息...  输入 @ 可以艾特别人" maxlength="500">
          <div id="mentionList" class="mention-list hidden"></div>
        </div>
        <button id="sendBtn">发送</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
