<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时聊天室</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>💬 实时聊天室 <span id="roomBadge" class="room-badge hidden"></span></h1>
      <div class="header-actions">
        <button id="shareBtn" class="share-btn hidden" title="分享房间">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
        </button>
        <div id="userStatus" class="user-status">未连接</div>
      </div>
    </header>

    <div id="loginScreen" class="login-screen">
      <h2>加入聊天</h2>
      <input type="text" id="roomIdInput" placeholder="房间ID（相同ID进入同一房间）" maxlength="30">
      <input type="text" id="usernameInput" placeholder="输入你的昵称" maxlength="20">
      <button id="joinBtn">加入聊天室</button>
    </div>

    <div id="chatScreen" class="chat-screen hidden">
      <div class="chat-content">
        <div id="messagesContainer" class="messages-container">
          <div id="loadMoreTip" class="load-more-tip">下拉加载更多历史消息...</div>
        </div>
        
        <div class="input-area">
          <button id="emojiBtn" class="emoji-toggle" title="表情">😊</button>
          <div class="input-wrapper">
            <div id="replyPreview" class="reply-preview hidden">
              <span id="replyPreviewText"></span>
              <button id="cancelReplyBtn" class="cancel-reply-btn">&times;</button>
            </div>
            <input type="text" id="messageInput" placeholder="输入消息...  输入 @ 可以艾特别人" maxlength="500">
            <div id="mentionList" class="mention-list hidden"></div>
            <div id="emojiPanel" class="emoji-panel hidden"></div>
          </div>
          <button id="sendBtn">发送</button>
        </div>
      </div>
      
      <div id="membersSidebar" class="members-sidebar">
        <h3>👥 群成员</h3>
        <div id="membersList" class="members-list">
          <div class="member-item">
            <span class="member-avatar">🤖</span>
            <span class="member-name">小助手</span>
            <span class="member-status online"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="shareModal" class="share-modal hidden">
    <div class="share-modal-overlay"></div>
    <div class="share-modal-content">
      <button id="shareCloseBtn" class="share-close-btn">&times;</button>
      <h3 class="share-title">📤 房间分享卡片</h3>
      <div id="shareCard" class="share-card">
        <div class="share-card-header">💬 Web Chat</div>
        <div class="share-card-icon">🌍</div>
        <div id="shareCardRoom" class="share-card-room">房间名</div>
        <div id="shareCardOnline" class="share-card-online">👥 0 人在线</div>
        <div class="share-card-slogan">「聊天不积极，思想有问题」</div>
        <div class="share-qr-wrapper">
          <div id="qrcode" class="share-qrcode"></div>
          <div class="share-qr-text">扫码加入聊天 →</div>
          <div id="shareCardRoomId" class="share-card-roomid">Room ID: room</div>
        </div>
        <div class="share-card-footer">打开浏览器扫码，即刻加入</div>
      </div>
      <div class="share-actions">
        <button id="copyLinkBtn" class="share-btn-secondary">
          <span>📋</span> 复制链接
        </button>
        <button id="saveImageBtn" class="share-btn-primary">
          <span>💾</span> 保存图片
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
